<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Eye outline -->
  <ellipse cx="32" cy="32" rx="28" ry="16" fill="none" stroke="#3584e4" stroke-width="3"/>
  <!-- Iris -->
  <circle cx="32" cy="32" r="10" fill="#3584e4" opacity="0.8"/>
  <!-- Pupil -->
  <circle cx="32" cy="32" r="5" fill="#1a1a2e"/>
  <!-- Tracking dot -->
  <circle cx="32" cy="32" r="2" fill="#ffffff"/>
  <!-- Corner eyelashes -->
  <line x1="4" y1="32" x2="10" y2="28" stroke="#3584e4" stroke-width="2" stroke-linecap="round"/>
  <line x1="4" y1="32" x2="10" y2="36" stroke="#3584e4" stroke-width="2" stroke-linecap="round"/>
  <line x1="60" y1="32" x2="54" y2="28" stroke="#3584e4" stroke-width="2" stroke-linecap="round"/>
  <line x1="60" y1="32" x2="54" y2="36" stroke="#3584e4" stroke-width="2" stroke-linecap="round"/>
</svg>
